name: Release desktop installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing draft release tag
        required: true
        default: v0.1.2

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload signed installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: Agent Memory Manager v__VERSION__
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  verify-updater-metadata:
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ inputs.tag }}" --pattern latest.json --dir updater-metadata

      - name: Verify supported updater targets
        run: node scripts/verify-updater-json.mjs updater-metadata/latest.json
